<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>页面未找到 | 天行队聊天总结</title>
    <style>
        :root {
            color: #17372f;
            background: #f4f6f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                linear-gradient(#cbd7d1 1px, transparent 1px),
                linear-gradient(90deg, #cbd7d1 1px, transparent 1px),
                #f4f6f0;
            background-size: 32px 32px;
        }

        main {
            width: min(100%, 560px);
            border: 1px solid #a5b4ad;
            border-top: 8px solid #df4b91;
            border-radius: 8px;
            padding: clamp(28px, 8vw, 52px);
            background: #fbfcf7;
            box-shadow: 8px 8px 0 #17372f;
        }

        .code {
            margin: 0 0 12px;
            color: #155b4e;
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 12vw, 4.5rem);
            line-height: 1;
            letter-spacing: 0;
        }

        p {
            margin: 18px 0 26px;
            color: #60716a;
            line-height: 1.7;
        }

        a {
            display: inline-flex;
            min-height: 44px;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            border: 1px solid #17372f;
            border-radius: 6px;
            color: #fbfcf7;
            background: #17372f;
            font-weight: 750;
            text-decoration: none;
        }

        a:focus-visible {
            outline: 3px solid #c3ed62;
            outline-offset: 3px;
        }

        @media (max-width: 430px) {
            body {
                padding: 18px;
            }

            main {
                box-shadow: 5px 5px 0 #17372f;
            }

            a {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main>
        <p class="code">404 · PAGE NOT FOUND</p>
        <h1>这一页不在骑行路线里</h1>
        <p>地址可能已更新，返回首页可以继续查看全部天行队聊天总结。</p>
        <a id="home-link" href="./index.html">返回总结首页</a>
    </main>
    <script>
        const homeLink = document.getElementById("home-link");
        const pathParts = window.location.pathname.split("/").filter(Boolean);
        const isProjectPage = window.location.hostname.endsWith("github.io");
        if (isProjectPage && pathParts.length) {
            homeLink.href = `/${pathParts[0]}/`;
        } else if (window.location.protocol !== "file:") {
            homeLink.href = "/";
        }
    </script>
</body>
</html>
